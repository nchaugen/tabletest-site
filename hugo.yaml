# Hugo configuration file
title: TableTest

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Learn
      pageRef: /learn
      weight: 1
    - name: Reference
      pageRef: /reference
      weight: 2
    - name: Tools
      pageRef: /tools
      weight: 3
    - name: Changelog
      pageRef: /changelog
      weight: 4
    - name: Search
      weight: 5
      params:
        type: search
    - name: GitHub
      weight: 6
      url: "https://github.com/nchaugen/tabletest"
      params:
        icon: github

params:
  currentVersion: "1.2.1"
  currentTableTestVersion: "1.2.1"
  currentJUnitVersion: "6.0.3"

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/dataTables.svg
      dark: images/dataTables_dark.svg
      link: /
      width: 20
      height: 10

  banner:
    key: 'announcement-121'
    message: |
      🎉 [TableTest 1.2.1](https://github.com/nchaugen/tabletest/releases/tag/tabletest-junit-1.2.1) is out — quoted map keys, array parameter support and Java 8+. Read the [changelog](/changelog/).

  footer:
    displayCopyright: false
    displayPoweredBy: false

  editURL:
    enable: false
    base: "https://github.com/nchaugen/tabletest-site/edit/main/content"

outputs:
  home: [html, rss, llms]
  page: [html]
  section: [html, rss]
